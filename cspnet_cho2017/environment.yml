name: mi_spdnet

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Scientific stack
  - numpy>=1.24
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pandas>=2.0
  - h5py>=3.9

  - pip:
    # PyTorch with CUDA 12.4
    - torch==2.6.0 --index-url https://download.pytorch.org/whl/cu124
    - torchvision==0.21.0 --index-url https://download.pytorch.org/whl/cu124

    # EEG / BCI
    - mne==1.7.0
    - moabb==1.5.0
    - mne-icalabel==0.6.0
    - pyriemann>=0.5

    # Utilities
    - tqdm
    - pymatreader
    - pooch
