name: mi_spdnet

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # PyTorch with CUDA 11.8
  - pytorch=2.1.2
  - torchvision=0.16.2
  - pytorch-cuda=11.8

  # Scientific stack
  - numpy>=1.24
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pandas>=2.0
  - h5py>=3.9

  - pip:
    # EEG / BCI
    - mne==1.7.0
    - moabb==1.1.0
    - mne-icalabel==0.6.0
    - pyriemann>=0.5

    # Utilities
    - tqdm
    - pymatreader
    - pooch
